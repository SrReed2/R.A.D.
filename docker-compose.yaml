services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - app-network
  frontend:
  build: ./frontend-rad
  ports:
    - "3000:3000"
  volumes:
    - ./frontend-rad:/app
    - node_modules:/app/node_modules
    
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: raduser
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: rad_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  pgdata:
  node_modules:

networks:
  app-network:
    driver: bridge

